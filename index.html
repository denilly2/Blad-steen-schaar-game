<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>Blad Steen Schaar AI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div id="countdown" class="countdown">3</div>
      <div class="icons">
        <span>✋</span>
        <span>✊</span>
        <span>✌️</span>
      </div>
   

    <div class="game-area">
      <div class="card">
        <video id="webcam" autoplay playsinline></video>
        <div id="detectedGesture" class="detected">Detectie: -</div>
      </div>
      <div class="card">
        <div id="aichoice" class="ai-choice">?</div>
      </div>
    </div>

<p class="hint">Steek 👍 omhoog om te starten</p>


<h1 id="resultText"></h1>

<div class="score">
  You: <span id="playerScore">0</span> |
  AI: <span id="aiScore">0</span>
</div>
 </div>

 <script>
  src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0/dist/tf.min.js"
 </script>
 
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0/dist/tf.min.js"></script>

  </body>
</html>
